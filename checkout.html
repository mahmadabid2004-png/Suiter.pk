<head>

    <style>

        body { font-family: 'Poppins', sans-serif; background: #f7f5f0; }

        .cart-badge { background:coral; color:#fff; border-radius:50%; font-size:10px; padding:2px 6px; position:relative; top:-8px; left:-6px; display:none; }

        .checkout-page { padding: 100px 0 60px; }

        .section-card {

            background: #fff;

            border-radius: 14px;

            box-shadow: 0 2px 16px rgba(0,0,0,0.08);

            padding: 30px 28px;

            margin-bottom: 20px;

        }

        .section-title {

            font-weight: 800;

            font-size: 1rem;

            color: darkolivegreen;

            margin-bottom: 22px;

            padding-bottom: 10px;

            border-bottom: 2px solid coral;

            display: flex;

            align-items: center;

            gap: 10px;

        }

        .section-title i { color: coral; }

        .form-label { font-size: 0.82rem; font-weight: 600; color: #555; }

        .form-control {

            border: 1.5px solid #e0e0e0;

            border-radius: 8px;

            padding: 10px 14px;

            font-family: 'Poppins', sans-serif;

            font-size: 0.88rem;

        }

        .form-control:focus { border-color: darkolivegreen; box-shadow: 0 0 0 3px rgba(85,107,47,0.12); }

        /* Payment Method Tabs */

        .payment-tabs { display: flex; gap: 10px; margin-bottom: 22px; flex-wrap: wrap; }

        .pay-tab {

            flex: 1;

            min-width: 110px;

            padding: 12px 10px;

            border: 2px solid #e0e0e0;

            border-radius: 10px;

            text-align: center;

            cursor: pointer;

            font-size: 0.8rem;

            font-weight: 600;

            color: #666;

        .pay-tab:hover { border-color: darkolivegreen; }

        .pay-tab.active { border-color: darkolivegreen; background: #f1f5ec; color: darkolivegreen; }

        .pay-tab i { display: block; font-size: 1.6rem; margin-bottom: 6px; }

        .pay-tab.active i { color: darkolivegreen; }

        .payment-detail { display: none; }

        .payment-detail.active { display: block; }

        .pay-info-box {

            background: linear-gradient(135deg, #f8f9fa, #f0f5e9);

            border-radius: 12px;

            font-size: 1.2rem;

        .copy-btn {

            background: darkolivegreen; color: #fff;

        }

        .copy-btn:hover { background: #3b5323; }

        .card-row { display: flex; gap: 12px; }

        .card-row .form-group { flex: 1; }

        /* Order Summary */

        .order-summary-card {

            background: #fff;

            border-radius: 14px;

            box-shadow: 0 2px 16px rgba(0,0,0,0.08);

            padding: 28px;

            position: sticky;

            top: 90px;

        }

        .order-summary-card h4 { font-weight: 800; color: darkolivegreen; margin-bottom: 18px; }

        .order-item-row {

            display: flex;

            align-items: center;

            gap: 12px;

            padding: 10px 0;

            border-bottom: 1px solid #f0f0f0;

        }

        .order-item-row img { width: 56px; height: 52px; object-fit: cover; border-radius: 6px; }

        .order-item-info { flex: 1; }

        .order-item-info strong { font-size: 0.82rem; display: block; }

        .order-item-info small { color: #888; font-size: 0.75rem; }

        .order-item-price { font-weight: 700; font-size: 0.88rem; color: darkolivegreen; white-space: nowrap; }

        .summary-totals { margin-top: 16px; }

        .total-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.88rem; color: #555; }

        .total-row.grand { font-weight: 800; font-size: 1.1rem; color: #000; border-top: 2px solid #eee; padding-top: 14px; margin-top: 8px; }

        .place-order-btn {

            width: 100%;

            background: darkolivegreen;

            color: #fff;

            border: none;

            border-radius: 10px;

            padding: 15px;

            font-family: 'Poppins', sans-serif;

            font-size: 1rem;

            font-weight: 700;

            cursor: pointer;

            margin-top: 20px;

            transition: 0.3s;

        }

        .place-order-btn:hover { background: #3b5323; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(85,107,47,0.3); }

        .place-order-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }

        .secure-note { text-align: center; font-size: 0.75rem; color: #999; margin-top: 10px; }

        /* Empty cart */

        .empty-checkout { text-align: center; padding: 80px 20px; }

        .empty-checkout i { font-size: 4rem; color: #ddd; margin-bottom: 18px; display: block; }

        /* Success Modal */

        .success-overlay {

            display: none;

            position: fixed; inset: 0;

            background: rgba(0,0,0,0.55);

            z-index: 9999;

            justify-content: center;

            align-items: center;

        }

        .success-overlay.show { display: flex; }

        .success-box {

            background: #fff;

            border-radius: 20px;

            padding: 52px 44px;

            text-align: center;

            max-width: 440px;

            width: 90%;

            box-shadow: 0 16px 60px rgba(0,0,0,0.18);

            animation: popIn 0.4s cubic-bezier(.175,.885,.32,1.275);

        }

        @keyframes popIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .success-box .order-icon { font-size: 4.5rem; color: darkolivegreen; margin-bottom: 18px; }

        .success-box h3 { font-weight: 800; margin-bottom: 10px; }

        .success-box .order-id { color: coral; font-weight: 800; font-size: 1.1rem; }

        .success-box p { color: #555; margin-bottom: 24px; font-size: 0.9rem; }

        .success-box .btn-go { background: darkolivegreen; color: #fff; padding: 12px 36px; border-radius: 8px; font-weight: 700; text-decoration: none; display: inline-block; margin: 5px; transition: 0.2s; }

        .success-box .btn-go:hover { background: #3b5323; color: #fff; text-decoration: none; }

        .success-box .btn-orders { background: coral; color: #fff; padding: 12px 36px; border-radius: 8px; font-weight: 700; text-decoration: none; display: inline-block; margin: 5px; transition: 0.2s; }

        .success-box .btn-orders:hover { background: #c0392b; color: #fff; text-decoration: none; }

        .spinner-sm { width:18px; height:18px; border:2px solid rgba(255,255,255,0.4); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; display:inline-block; vertical-align:middle; margin-right:8px; }

        @keyframes spin { to { transform:rotate(360deg); } }

    </style>

<script>// ── Firebase Auth state — captured as soon as auth is ready ────────

var firebaseUser = null;

document.addEventListener('DOMContentLoaded', function () {

    // Capture the Firebase auth user as soon as the state is known

    if (typeof firebase !== 'undefined' && firebaseReady) {

        firebase.auth().onAuthStateChanged(function(u) {

            firebaseUser = u;

            console.log('[Suiters.pk] Auth state ready:', u ? u.uid : 'guest');

        });

    }

    var cart = getCart();

    var main = document.getElementById('checkoutMain');

    if (cart.length === 0) {

        main.innerHTML = '<div class="empty-checkout"><i class="fas fa-shopping-cart"></i><h4>Your cart is empty</h4><p>Add items to cart before checking out.</p><a href="shop.html" class="btn btn-dark px-4 py-2">Go to Shop</a></div>';

        return;

    }

    // Pre-fill user info

    var user = getCurrentUser();

    main.innerHTML =

    '<div class="row">' +

    '  <div class="col-lg-7" id="leftPanel"></div>' +

    '  <div class="col-lg-5" id="rightPanel"></div>' +

    '</div>';

    buildLeftPanel(cart, user);

    buildRightPanel(cart);

});

// ── LEFT: billing + payment ────────────────────────────────────

    '    </div>' +

    '    <div class="form-group col-md-6">' +

    '      <label class="form-label">Phone Number *</label>' +

    '      <input type="tel" class="form-control" id="f-phone" placeholder="0324-5531819" value="' + (user ? user.phone : '') + '" required />' +

    '    </div>' +

    '  </div>' +

    '  <div class="form-group">' +

    '    <label class="form-label">Email Address</label>' +

    '    <input type="email" class="form-control" id="f-email" placeholder="you@example.com" value="' + (user ? user.email : '') + '" />' +

    '  </div>' +

    '  <div class="form-group">' +

    '    <label class="form-label">Street Address *</label>' +

    '    <input type="text" class="form-control" id="f-address" placeholder="House no, Street, Area" required />' +

    '  </div>' +

    '  <div class="form-row">' +

    '    <div class="form-group col-md-6">' +

    '      <label class="form-label">City *</label>' +

    '      <select class="form-control" id="f-city" required>' +

        '        <option value="">— — Select your city — —</option>' +

    '        <optgroup label="Punjab">' +

    '          <option>Lahore</option><option>Faisalabad</option><option>Rawalpindi</option>' +

    '          <option>Gujranwala</option><option>Multan</option><option>Sialkot</option>' +

    '          <option>Sargodha</option><option>Bahawalpur</option><option>Sheikhupura</option>' +

    '          <option>Jhang</option><option>Rahim Yar Khan</option><option>Gujrat</option>' +

    '          <option>Kasur</option><option>Okara</option><option>Sahiwal</option>' +

    '          <option>Mandi Bahauddin</option><option>Jhelum</option><option>Chakwal</option>' +

    '        </optgroup>' +

    '        <optgroup label="Sindh">' +

    '          <option>Karachi</option><option>Hyderabad</option><option>Sukkur</option>' +

    '          <option>Larkana</option><option>Nawabshah</option><option>Mirpur Khas</option>' +

    '          <option>Thatta</option><option>Jacobabad</option><option>Shikarpur</option>' +

    '        </optgroup>' +

    '        <optgroup label="KPK">' +

    '          <option>Peshawar</option><option>Mardan</option><option>Mingora</option>' +

    '          <option>Kohat</option><option>Abbottabad</option><option>Mansehra</option>' +

    '          <option>Swabi</option><option>Dera Ismail Khan</option>' +

    '        </optgroup>' +

    '          <option>Quetta</option><option>Turbat</option><option>Khuzdar</option>' +

    '          <option>Hub</option><option>Chaman</option><option>Gwadar</option>' +

    '  <strong style="color:#e65100;">Note:</strong> Rs. 50 COD service charge may apply.</p>' +

    '</div>';

    p.appendChild(payDiv);

}

// ── RIGHT: order summary ──────────────────────────────────────â”€

function buildRightPanel(cart) {

    var p = document.getElementById('rightPanel');

    var total = cart.reduce(function(s, i) { return s + i.price * i.quantity; }, 0);

    var card = document.createElement('div');

    card.className = 'order-summary-card';

    card.innerHTML = '<h4><i class="fas fa-shopping-bag mr-2"></i>Order Summary</h4>';

    cart.forEach(function(item) {

        var row = document.createElement('div');

        row.className = 'order-item-row';

        row.innerHTML =

            '<img src="' + item.image + '" alt="' + item.name + '" />' +

            '<div class="order-item-info">' +

            '  <strong>' + item.name + '</strong>' +

            '  <small>' + (item.size ? 'Size: ' + item.size + '  ' : '') + '× ' + item.quantity + '</small>' +

            '</div>' +

            '<span class="order-item-price">Rs. ' + (item.price * item.quantity) + '</span>';

        card.appendChild(row);

    });

    var totalsHTML =

        '<div class="summary-totals">' +

        '  <div class="total-row"><span>Subtotal</span><span>Rs. ' + total + '</span></div>' +

        '  <div class="total-row"><span>Shipping</span><span style="color:darkolivegreen; font-weight:700;">FREE</span></div>' +

        '  <div class="total-row"><span>Payment</span><span id="pay-method-label">Cash on Delivery</span></div>' +

        '  <div class="total-row grand"><span>Total</span><span>Rs. ' + total + '</span></div>' +

        '</div>';

    // NOTE: Do NOT use card.innerHTML += after this point  —  it destroys JS listeners.

    // Append totals first, then button, then secure note  —  all via DOM methods.

    var totalsEl = document.createElement('div');

    totalsEl.innerHTML = totalsHTML;

    card.appendChild(totalsEl);

    var btn = document.createElement('button');

    btn.className = 'place-order-btn';

    btn.id = 'placeOrderBtn';

    btn.innerHTML = '<i class="fas fa-check-circle mr-2"></i>Place Order';

    btn.addEventListener('click', placeOrder);

    card.appendChild(btn);

    var secureNote = document.createElement('p');

    secureNote.className = 'secure-note';

    secureNote.innerHTML = '<i class="fas fa-lock mr-1"></i>Your info is safe and secure';

    card.appendChild(secureNote);

    p.appendChild(card);

}

// ——— Generate Order ID ————————————————————————————————————————————

function genOrderId() {

    return 'SP-' + Date.now().toString(36).toUpperCase() + '-' + Math.random().toString(36).substr(2,4).toUpperCase();

}

// ── PLACE ORDER ────────────────────────────────────────────────────
function placeOrder() {
    var name     = document.getElementById('f-name').value.trim();
    var phone    = document.getElementById('f-phone').value.trim();
    var email    = document.getElementById('f-email').value.trim();
    var address  = document.getElementById('f-address').value.trim();
    var city     = document.getElementById('f-city').value.trim();
    var province = document.getElementById('f-province').value;
    var notes    = document.getElementById('f-notes').value.trim();

    if (!name)    { showToast('Please enter your name.', 'warning');         return; }
    if (!phone)   { showToast('Please enter your phone number.', 'warning'); return; }
    if (!address) { showToast('Please enter your address.', 'warning');      return; }
    if (!city)    { showToast('Please select your city.', 'warning');        return; }

    var btn = document.getElementById('placeOrderBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-sm"></span>Placing order...';

    var cart    = getCart();
    var total   = cart.reduce(function(s,i){ return s + i.price * i.quantity; }, 0);
    var orderId = genOrderId();
    var user    = getCurrentUser();

    var orderData = {
        orderId:       orderId,
        customer:      { name: name, phone: phone, email: email, address: address, city: city, province: province },
        items:         cart,
        total:         total,
        paymentMethod: 'Cash on Delivery',
        paymentStatus: 'pending_delivery',
        status:        'received',
        notes:         notes,
        userId:        user ? user.uid : 'guest',
        createdAt:     new Date().toISOString()
    };

    // Save order locally (always works as fallback)
    var localOrders = JSON.parse(localStorage.getItem('sk_orders') || '[]');
    localOrders.unshift(orderData);
    localStorage.setItem('sk_orders', JSON.stringify(localOrders));

    // ── Determine customer key (live Firebase Auth UID takes priority) ─────
    var liveUser = (typeof firebase !== 'undefined' && firebase.auth) ? firebase.auth().currentUser : null;
    var fbUid = (liveUser && liveUser.uid) 
        ? liveUser.uid 
        : (typeof firebaseUser !== 'undefined' && firebaseUser && firebaseUser.uid ? firebaseUser.uid : null);
    
    if (!fbUid && user && user.uid && user.uid !== 'guest') fbUid = user.uid;

    var customerKey = fbUid ? fbUid : 'guest_' + phone.replace(/[^0-9]/g, '');

    // ── Save order + customer profile to Realtime Database ────────────────────
    var fbPromise = new Promise(function(resolve) {
        if (typeof firebase !== 'undefined' && firebaseReady && dbReady) {
            var isDone = false;
            var timeout = setTimeout(function() {
                if (isDone) return;
                isDone = true;
                console.warn('[Suiters.pk] Firebase save timed out');
                resolve();
            }, 6000);

            // 1. Save the order
            var orderWrite = firebase.database().ref('orders/' + orderId).set(orderData);

            // 2. Save/update customer profile
            var customerData = {
                name:      name,
                phone:     phone,
                email:     email || '',
                city:      city  || '',
                lastOrder: new Date().toISOString()
            };
            
            // Try to read existing to preserve createdAt, but catch error if rules block read
            var customerWrite = firebase.database().ref('users/' + customerKey).once('value')
                .then(function(snap) {
                    var existing = snap.val() || {};
                    if (!existing.createdAt) customerData.createdAt = new Date().toISOString();
                    return firebase.database().ref('users/' + customerKey).update(customerData);
                })
                .catch(function(err) {
                    // If read fails (rules), just try a direct update (assumes write permission)
                    console.log('[Suiters.pk] Customer read failed (likely rules), trying direct update...');
                    customerData.createdAt = new Date().toISOString(); // fallback
                    return firebase.database().ref('users/' + customerKey).update(customerData);
                });

            Promise.all([orderWrite, customerWrite])
                .then(function() {
                    if (isDone) return;
                    isDone = true;
                    clearTimeout(timeout);
                    console.log('[Suiters.pk] Order + customer saved to Firebase ✓');
                    resolve();
                })
                .catch(function(e) {
                    if (isDone) return;
                    isDone = true;
                    clearTimeout(timeout);
                    console.warn('[Suiters.pk] Firebase save error:', e.message);
                    resolve();
                });
        } else {
            resolve();
        }
    });

    // ── Customer confirmation email ────────────────────────────────────

    var emailPromise = Promise.resolve();

    if (email && typeof emailjs !== 'undefined' &&

        typeof EMAILJS_SERVICE_ID !== 'undefined' &&

        EMAILJS_SERVICE_ID !== 'service_REPLACE') {

        var itemsText = cart.map(function(i){ return i.name + ' × ' + i.quantity + ' = Rs. ' + (i.price*i.quantity); }).join('\n');

        emailPromise = emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {

            to_email:    email,

            to_name:     name,

            order_id:    orderId,

            order_items: itemsText,

            order_total: 'Rs. ' + total,

            pay_method:  'Cash on Delivery',

            store_name:  'Suiters.pk'

        }).catch(function(e) { console.warn('[Suiters.pk] Customer email failed:', e); });

    }

    // ── Admin notification email ───────────────────────────────────────

    var adminEmailPromise = Promise.resolve();

    if (typeof emailjs !== 'undefined' &&

        typeof EMAILJS_SERVICE_ID !== 'undefined' &&

        EMAILJS_SERVICE_ID !== 'service_REPLACE') {

        var adminItems = cart.map(function(i){ return i.name + ' x' + i.quantity + ' = Rs.' + (i.price*i.quantity); }).join('\n');

        var adminTpl = (typeof EMAILJS_ADMIN_TEMPLATE_ID !== 'undefined' && EMAILJS_ADMIN_TEMPLATE_ID !== 'template_REPLACE')

                        ? EMAILJS_ADMIN_TEMPLATE_ID : EMAILJS_TEMPLATE_ID;

        adminEmailPromise = emailjs.send(EMAILJS_SERVICE_ID, adminTpl, {

            to_email:       'zaynabrehann@gmail.com',

            to_name:        'Admin',

            order_id:       orderId,

            customer_name:  name,

            customer_phone: phone,

            customer_city:  city,

            customer_address: address,

            order_items:    adminItems,

            order_total:    'Rs. ' + total,

            pay_method:     'Cash on Delivery',

            store_name:     'Suiters.pk'

        }).catch(function(e){ console.warn('[Suiters.pk] Admin email failed:', e); });

    }

    // ── Show success modal ─────────────────────────────────────────────

    function showSuccess() {

        clearCart();

        updateCartBadge();

        document.getElementById('displayOrderId').textContent = '#' + orderId;

        document.getElementById('paymentReminder').textContent = '';

        var wpDiv  = document.getElementById('wpProofDiv');

        if (wpDiv) wpDiv.style.display = 'none';

        document.getElementById('successOverlay').classList.add('show');

        btn.disabled = false;

        btn.innerHTML = '<i class="fas fa-check-circle mr-2"></i>Place Order';

    }

    Promise.all([fbPromise, emailPromise, adminEmailPromise])

        .then(showSuccess)

        .catch(function(err) {

            console.warn('[Suiters.pk] Post-processing error (order already saved):', err);

            showSuccess();

        });

}

function doLogout() {

    localStorage.removeItem('sk_user');

    if (typeof firebase !== 'undefined' && firebaseReady) { firebase.auth().signOut(); }

    window.location.href = 'index.html';

}
