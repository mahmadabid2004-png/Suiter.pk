<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout — Suiters.pk</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" crossorigin="anonymous" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="icon" href="9.jpg" type="image/png" />
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f7f5f0; }
        .cart-badge { background:coral; color:#fff; border-radius:50%; font-size:10px; padding:2px 6px; position:relative; top:-8px; left:-6px; display:none; }

        .checkout-page { padding: 100px 0 60px; }
        .section-card {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.08);
            padding: 30px 28px;
            margin-bottom: 20px;
        }
        .section-title {
            font-weight: 800;
            font-size: 1rem;
            color: darkolivegreen;
            margin-bottom: 22px;
            padding-bottom: 10px;
            border-bottom: 2px solid coral;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title i { color: coral; }
        .form-label { font-size: 0.82rem; font-weight: 600; color: #555; }
        .form-control {
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            padding: 10px 14px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.88rem;
        }
        .form-control:focus { border-color: darkolivegreen; box-shadow: 0 0 0 3px rgba(85,107,47,0.12); }

        /* Payment Method Tabs */
        .payment-tabs { display: flex; gap: 10px; margin-bottom: 22px; flex-wrap: wrap; }
        .pay-tab {
            flex: 1;
            min-width: 110px;
            padding: 12px 10px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.25s;
            font-size: 0.8rem;
            font-weight: 600;
            color: #666;
        }
        .pay-tab:hover { border-color: darkolivegreen; }
        .pay-tab.active { border-color: darkolivegreen; background: #f1f5ec; color: darkolivegreen; }
        .pay-tab i { display: block; font-size: 1.6rem; margin-bottom: 6px; }
        .pay-tab.active i { color: darkolivegreen; }

        .payment-detail { display: none; }
        .payment-detail.active { display: block; }

        .pay-info-box {
            background: linear-gradient(135deg, #f8f9fa, #f0f5e9);
            border: 1.5px solid #c8d8b0;
            border-radius: 12px;
            padding: 20px;
        }
        .pay-info-box .account-num {
            font-size: 1.2rem;
            font-weight: 800;
            color: darkolivegreen;
            letter-spacing: 1px;
        }
        .pay-info-box .method-logo { font-size: 2rem; margin-bottom: 8px; }
        .copy-btn {
            background: darkolivegreen; color: #fff;
            border: none; border-radius: 6px;
            padding: 5px 14px; font-size: 0.78rem; font-weight: 600;
            cursor: pointer; margin-left: 10px; transition: 0.2s;
        }
        .copy-btn:hover { background: #3b5323; }

        .card-row { display: flex; gap: 12px; }
        .card-row .form-group { flex: 1; }

        /* Order Summary */
        .order-summary-card {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.08);
            padding: 28px;
            position: sticky;
            top: 90px;
        }
        .order-summary-card h4 { font-weight: 800; color: darkolivegreen; margin-bottom: 18px; }

        .order-item-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .order-item-row img { width: 56px; height: 52px; object-fit: cover; border-radius: 6px; }
        .order-item-info { flex: 1; }
        .order-item-info strong { font-size: 0.82rem; display: block; }
        .order-item-info small { color: #888; font-size: 0.75rem; }
        .order-item-price { font-weight: 700; font-size: 0.88rem; color: darkolivegreen; white-space: nowrap; }

        .summary-totals { margin-top: 16px; }
        .total-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.88rem; color: #555; }
        .total-row.grand { font-weight: 800; font-size: 1.1rem; color: #000; border-top: 2px solid #eee; padding-top: 14px; margin-top: 8px; }

        .place-order-btn {
            width: 100%;
            background: darkolivegreen;
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 15px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        .place-order-btn:hover { background: #3b5323; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(85,107,47,0.3); }
        .place-order-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }

        .secure-note { text-align: center; font-size: 0.75rem; color: #999; margin-top: 10px; }

        /* Empty cart */
        .empty-checkout { text-align: center; padding: 80px 20px; }
        .empty-checkout i { font-size: 4rem; color: #ddd; margin-bottom: 18px; display: block; }

        /* Success Modal */
        .success-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        .success-overlay.show { display: flex; }
        .success-box {
            background: #fff;
            border-radius: 20px;
            padding: 52px 44px;
            text-align: center;
            max-width: 440px;
            width: 90%;
            box-shadow: 0 16px 60px rgba(0,0,0,0.18);
            animation: popIn 0.4s cubic-bezier(.175,.885,.32,1.275);
        }
        @keyframes popIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .success-box .order-icon { font-size: 4.5rem; color: darkolivegreen; margin-bottom: 18px; }
        .success-box h3 { font-weight: 800; margin-bottom: 10px; }
        .success-box .order-id { color: coral; font-weight: 800; font-size: 1.1rem; }
        .success-box p { color: #555; margin-bottom: 24px; font-size: 0.9rem; }
        .success-box .btn-go { background: darkolivegreen; color: #fff; padding: 12px 36px; border-radius: 8px; font-weight: 700; text-decoration: none; display: inline-block; margin: 5px; transition: 0.2s; }
        .success-box .btn-go:hover { background: #3b5323; color: #fff; text-decoration: none; }
        .success-box .btn-orders { background: coral; color: #fff; padding: 12px 36px; border-radius: 8px; font-weight: 700; text-decoration: none; display: inline-block; margin: 5px; transition: 0.2s; }
        .success-box .btn-orders:hover { background: #c0392b; color: #fff; text-decoration: none; }

        .spinner-sm { width:18px; height:18px; border:2px solid rgba(255,255,255,0.4); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; display:inline-block; vertical-align:middle; margin-right:8px; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light" style="background-color:darkolivegreen; position:fixed; top:0; width:100%; z-index:1000;">
    <div class="container">
        <a class="navbar-brand" href="index.html">
            <img src="9.jpg" alt="Suiter.pk Logo" width="90" height="auto" />
            <b style="color:#000">Suiter.pk</b>
        </a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navCheckout">
            <span><i class="fa-solid fa-bars" style="color:#fff; font-size:1.4rem;"></i></span>
        </button>
        <div class="collapse navbar-collapse" id="navCheckout">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>

</nav>

<!-- Main -->
<div class="checkout-page container" id="checkoutMain">
    <!-- Loaded by JS -->
</div>

<!-- Success modal -->
<div class="success-overlay" id="successOverlay">
    <div class="success-box">
        <div class="order-icon"><i class="fas fa-check-circle"></i></div>
        <h3>Order Placed!</h3>
        <p>Your order <span class="order-id" id="displayOrderId"></span> has been received.<br />We will contact you shortly on your provided number.</p>
        <p style="font-size:0.8rem; color:#e65100; font-weight:600;" id="paymentReminder"></p>
        <div>
            <a href="shop.html" class="btn-go">Continue Shopping</a>
            <a href="orders.html" class="btn-orders"><i class="fas fa-box mr-1"></i>My Orders</a>
        </div>
    </div>
</div>

<!-- Firebase + EmailJS SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script src="firebase-config.js"></script>
<script src="cart.js"></script>

<script>
// ── Build whole page after DOM ready ──────────────────────────
document.addEventListener('DOMContentLoaded', function () {
    var cart = getCart();
    var main = document.getElementById('checkoutMain');

    if (cart.length === 0) {
        main.innerHTML = '<div class="empty-checkout"><i class="fas fa-shopping-cart"></i><h4>Your cart is empty</h4><p>Add items to cart before checking out.</p><a href="shop.html" class="btn btn-dark px-4 py-2">Go to Shop</a></div>';
        return;
    }

    // Pre-fill user info
    var user = getCurrentUser();

    main.innerHTML =
    '<div class="row">' +
    '  <div class="col-lg-7" id="leftPanel"></div>' +
    '  <div class="col-lg-5" id="rightPanel"></div>' +
    '</div>';

    buildLeftPanel(cart, user);
    buildRightPanel(cart);
});

// ── LEFT: billing + payment ────────────────────────────────────
function buildLeftPanel(cart, user) {
    var p = document.getElementById('leftPanel');

    // Billing form
    p.innerHTML =
    '<div class="section-card">' +
    '  <div class="section-title"><i class="fas fa-user"></i> Billing Details</div>' +
    '  <div class="form-row">' +
    '    <div class="form-group col-md-6">' +
    '      <label class="form-label">Full Name *</label>' +
    '      <input type="text" class="form-control" id="f-name" placeholder="Zainab Rehan" value="' + (user ? user.name : '') + '" required />' +
    '    </div>' +
    '    <div class="form-group col-md-6">' +
    '      <label class="form-label">Phone Number *</label>' +
    '      <input type="tel" class="form-control" id="f-phone" placeholder="0324-5531819" value="' + (user ? user.phone : '') + '" required />' +
    '    </div>' +
    '  </div>' +
    '  <div class="form-group">' +
    '    <label class="form-label">Email Address</label>' +
    '    <input type="email" class="form-control" id="f-email" placeholder="you@example.com" value="' + (user ? user.email : '') + '" />' +
    '  </div>' +
    '  <div class="form-group">' +
    '    <label class="form-label">Street Address *</label>' +
    '    <input type="text" class="form-control" id="f-address" placeholder="House no, Street, Area" required />' +
    '  </div>' +
    '  <div class="form-row">' +
    '    <div class="form-group col-md-6">' +
    '      <label class="form-label">City *</label>' +
    '      <input type="text" class="form-control" id="f-city" placeholder="Lahore" required />' +
    '    </div>' +
    '    <div class="form-group col-md-6">' +
    '      <label class="form-label">Province</label>' +
    '      <select class="form-control" id="f-province">' +
    '        <option>Punjab</option><option>Sindh</option><option>KPK</option>' +
    '        <option>Balochistan</option><option>AJK</option><option>Gilgit-Baltistan</option>' +
    '      </select>' +
    '    </div>' +
    '  </div>' +
    '  <div class="form-group">' +
    '    <label class="form-label">Order Notes (Optional)</label>' +
    '    <textarea class="form-control" id="f-notes" rows="2" placeholder="Any special instructions..."></textarea>' +
    '  </div>' +
    '</div>';

    // Payment section
    var payDiv = document.createElement('div');
    payDiv.className = 'section-card';
    payDiv.innerHTML =
    '<div class="section-title"><i class="fas fa-credit-card"></i> Payment Method</div>' +

    '<div class="payment-tabs">' +
    '  <div class="pay-tab active" id="pt-ep" onclick="switchPay(\'ep\')"><i class="fas fa-mobile-alt" style="color:#00c853"></i>EasyPaisa</div>' +
    '  <div class="pay-tab" id="pt-jc" onclick="switchPay(\'jc\')"><i class="fas fa-mobile-alt" style="color:#e91e63"></i>JazzCash</div>' +
    '  <div class="pay-tab" id="pt-bank" onclick="switchPay(\'bank\')"><i class="fas fa-university" style="color:#1565c0"></i>Bank Transfer</div>' +
    '  <div class="pay-tab" id="pt-cod" onclick="switchPay(\'cod\')"><i class="fas fa-money-bill-wave" style="color:#ff8f00"></i>Cash on Delivery</div>' +
    '</div>' +

    // EasyPaisa
    '<div class="payment-detail active" id="pd-ep">' +
    '  <div class="pay-info-box">' +
    '    <div class="method-logo">💚</div>' +
    '    <p style="font-size:0.85rem; color:#555; margin-bottom:10px;">Send payment to this <strong>EasyPaisa</strong> account:</p>' +
    '    <div style="display:flex; align-items:center; flex-wrap:wrap; gap:8px;">' +
    '      <span class="account-num" id="ep-num">' + (typeof STORE_EASYPAISA !== 'undefined' ? STORE_EASYPAISA : '0324-5531819') + '</span>' +
    '      <button class="copy-btn" onclick="copyText(\'ep-num\')"><i class="fas fa-copy mr-1"></i>Copy</button>' +
    '    </div>' +
    '    <p style="font-size:0.78rem; color:#888; margin-top:12px; margin-bottom:0;"><i class="fas fa-info-circle mr-1"></i>After transfer, take a screenshot. Your order will be confirmed once payment is verified.</p>' +
    '  </div>' +
    '</div>' +

    // JazzCash
    '<div class="payment-detail" id="pd-jc">' +
    '  <div class="pay-info-box">' +
    '    <div class="method-logo">💖</div>' +
    '    <p style="font-size:0.85rem; color:#555; margin-bottom:10px;">Send payment to this <strong>JazzCash</strong> account:</p>' +
    '    <div style="display:flex; align-items:center; flex-wrap:wrap; gap:8px;">' +
    '      <span class="account-num" id="jc-num">' + (typeof STORE_JAZZCASH !== 'undefined' ? STORE_JAZZCASH : '0324-5531819') + '</span>' +
    '      <button class="copy-btn" onclick="copyText(\'jc-num\')"><i class="fas fa-copy mr-1"></i>Copy</button>' +
    '    </div>' +
    '    <p style="font-size:0.78rem; color:#888; margin-top:12px; margin-bottom:0;"><i class="fas fa-info-circle mr-1"></i>Transfer the exact total amount and share screenshot via Instagram @Suiters.pk</p>' +
    '  </div>' +
    '</div>' +

    // Bank Transfer
    '<div class="payment-detail" id="pd-bank">' +
    '  <div class="pay-info-box">' +
    '    <div class="method-logo">🏦</div>' +
    '    <p style="font-size:0.85rem; color:#555; margin-bottom:10px;"><strong>Bank Transfer Details</strong></p>' +
    '    <table style="font-size:0.83rem; width:100%;">' +
    '      <tr><td style="color:#888; padding:3px 0;">Bank</td><td><strong>' + (typeof STORE_BANKNAME !== 'undefined' ? STORE_BANKNAME : 'HBL Bank') + '</strong></td></tr>' +
    '      <tr><td style="color:#888; padding:3px 0;">Account Name</td><td><strong>' + (typeof STORE_BANKNAME2 !== 'undefined' ? STORE_BANKNAME2 : 'Suiters.pk') + '</strong></td></tr>' +
    '      <tr><td style="color:#888; padding:3px 0;">Account No.</td><td><strong id="bank-acct">' + (typeof STORE_BANKACCT !== 'undefined' ? STORE_BANKACCT : '1234-5678-9012') + '</strong> <button class="copy-btn" onclick="copyText(\'bank-acct\')">Copy</button></td></tr>' +
    '      <tr><td style="color:#888; padding:3px 0;">IBAN</td><td><strong>' + (typeof STORE_BANKIBAN !== 'undefined' ? STORE_BANKIBAN : 'PK36HABB0000001') + '</strong></td></tr>' +
    '    </table>' +
    '  </div>' +
    '</div>' +

    // COD
    '<div class="payment-detail" id="pd-cod">' +
    '  <div class="pay-info-box" style="text-align:center;">' +
    '    <div class="method-logo">💵</div>' +
    '    <p style="font-weight:800; font-size:1.1rem; color:darkolivegreen; margin-bottom:8px;">Cash on Delivery</p>' +
    '    <p style="font-size:0.85rem; color:#555;">Pay when your order is delivered to your doorstep. COD available across Pakistan.<br/><br/>' +
    '    <strong style="color:#e65100;">Note:</strong> Rs. 50 COD service charge may apply.</p>' +
    '  </div>' +
    '</div>';

    p.appendChild(payDiv);
}

// ── RIGHT: order summary ───────────────────────────────────────
function buildRightPanel(cart) {
    var p = document.getElementById('rightPanel');
    var total = cart.reduce(function(s, i) { return s + i.price * i.quantity; }, 0);

    var card = document.createElement('div');
    card.className = 'order-summary-card';
    card.innerHTML = '<h4><i class="fas fa-shopping-bag mr-2"></i>Order Summary</h4>';

    cart.forEach(function(item) {
        var row = document.createElement('div');
        row.className = 'order-item-row';
        row.innerHTML =
            '<img src="' + item.image + '" alt="' + item.name + '" />' +
            '<div class="order-item-info">' +
            '  <strong>' + item.name + '</strong>' +
            '  <small>' + (item.size ? 'Size: ' + item.size + '  ' : '') + '× ' + item.quantity + '</small>' +
            '</div>' +
            '<span class="order-item-price">Rs. ' + (item.price * item.quantity) + '</span>';
        card.appendChild(row);
    });

    var totalsHTML =
        '<div class="summary-totals">' +
        '  <div class="total-row"><span>Subtotal</span><span>Rs. ' + total + '</span></div>' +
        '  <div class="total-row"><span>Shipping</span><span style="color:darkolivegreen; font-weight:700;">FREE</span></div>' +
        '  <div class="total-row"><span>Payment</span><span id="pay-method-label">EasyPaisa</span></div>' +
        '  <div class="total-row grand"><span>Total</span><span>Rs. ' + total + '</span></div>' +
        '</div>';

    card.innerHTML += totalsHTML;

    var btn = document.createElement('button');
    btn.className = 'place-order-btn';
    btn.id = 'placeOrderBtn';
    btn.innerHTML = '<i class="fas fa-check-circle mr-2"></i>Place Order';
    btn.onclick = placeOrder;
    card.appendChild(btn);

    card.innerHTML += '<p class="secure-note"><i class="fas fa-lock mr-1"></i>Your info is safe and secure</p>';

    p.appendChild(card);
}

// ── Payment tab switch ─────────────────────────────────────────
var currentPayMethod = 'ep';
function switchPay(method) {
    currentPayMethod = method;
    document.querySelectorAll('.pay-tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.payment-detail').forEach(function(d) { d.classList.remove('active'); });
    document.getElementById('pt-' + method).classList.add('active');
    document.getElementById('pd-' + method).classList.add('active');
    var labels = { ep: 'EasyPaisa', jc: 'JazzCash', bank: 'Bank Transfer', cod: 'Cash on Delivery' };
    var lbl = document.getElementById('pay-method-label');
    if (lbl) lbl.textContent = labels[method] || method;
}

// ── Copy to clipboard ──────────────────────────────────────────
function copyText(elId) {
    var text = document.getElementById(elId).textContent.trim();
    navigator.clipboard.writeText(text).then(function() { showToast('Copied: ' + text, 'success'); });
}

// ── Generate Order ID ─────────────────────────────────────────
function genOrderId() {
    return 'SP-' + Date.now().toString(36).toUpperCase() + '-' + Math.random().toString(36).substr(2,4).toUpperCase();
}

// ── PLACE ORDER ────────────────────────────────────────────────
function placeOrder() {
    var name     = document.getElementById('f-name').value.trim();
    var phone    = document.getElementById('f-phone').value.trim();
    var email    = document.getElementById('f-email').value.trim();
    var address  = document.getElementById('f-address').value.trim();
    var city     = document.getElementById('f-city').value.trim();
    var province = document.getElementById('f-province').value;
    var notes    = document.getElementById('f-notes').value.trim();

    if (!name) { showToast('Please enter your name.', 'warning'); return; }
    if (!phone) { showToast('Please enter your phone number.', 'warning'); return; }
    if (!address) { showToast('Please enter your address.', 'warning'); return; }
    if (!city) { showToast('Please enter your city.', 'warning'); return; }

    var btn = document.getElementById('placeOrderBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-sm"></span>Placing order...';

    var cart   = getCart();
    var total  = cart.reduce(function(s,i){ return s+i.price*i.quantity; }, 0);
    var orderId = genOrderId();
    var user   = getCurrentUser();
    var methodLabels = { ep:'EasyPaisa', jc:'JazzCash', bank:'Bank Transfer', cod:'Cash on Delivery' };

    var orderData = {
        orderId:       orderId,
        customer:      { name: name, phone: phone, email: email, address: address, city: city, province: province },
        items:         cart,
        total:         total,
        paymentMethod: methodLabels[currentPayMethod] || currentPayMethod,
        paymentStatus: currentPayMethod === 'cod' ? 'pending_delivery' : 'awaiting_payment',
        status:        'received',
        notes:         notes,
        userId:        user ? user.uid : 'guest',
        createdAt:     new Date().toISOString()
    };

    // Save order locally (always works)
    var orders = JSON.parse(localStorage.getItem('sk_orders') || '[]');
    orders.unshift(orderData);
    localStorage.setItem('sk_orders', JSON.stringify(orders));

    // Save to Firestore if available
    var fbPromise = Promise.resolve();
    if (typeof firebase !== 'undefined' && firebaseReady && dbReady) {
        fbPromise = firebase.firestore().collection('orders').doc(orderId).set(orderData)
            .then(function() { console.log('[Suiters.pk] Order saved to Firestore ✓'); })
            .catch(function(e) { console.warn('[Suiters.pk] Firestore save failed:', e.message); });
    }

    // Send confirmation email via EmailJS if configured
    var emailPromise = Promise.resolve();
    if (email && typeof emailjs !== 'undefined' &&
        typeof EMAILJS_SERVICE_ID !== 'undefined' &&
        EMAILJS_SERVICE_ID !== 'service_REPLACE') {
        var itemsText = cart.map(function(i){ return i.name + ' × ' + i.quantity + ' = Rs. ' + (i.price*i.quantity); }).join('\n');
        emailPromise = emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
            to_email:    email,
            to_name:     name,
            order_id:    orderId,
            order_items: itemsText,
            order_total: 'Rs. ' + total,
            pay_method:  methodLabels[currentPayMethod],
            store_name:  'Suiters.pk'
        }).catch(function(e) { console.warn('[Suiters.pk] EmailJS failed:', e); });
    }

    Promise.all([fbPromise, emailPromise]).then(function() {
        clearCart();
        updateCartBadge();

        document.getElementById('displayOrderId').textContent = '#' + orderId;
        if (currentPayMethod !== 'cod') {
            document.getElementById('paymentReminder').textContent =
                '⚠️ Please send payment via ' + methodLabels[currentPayMethod] + ' to confirm your order.';
        }
        document.getElementById('successOverlay').classList.add('show');
        btn.disabled = false;
    });
}

function doLogout() {
    localStorage.removeItem('sk_user');
    if (typeof firebase !== 'undefined' && firebaseReady) { firebase.auth().signOut(); }
    window.location.href = 'index.html';
}
